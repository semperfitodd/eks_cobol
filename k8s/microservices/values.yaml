cobol0:
  name: cobol-0

  image:
    repository: "704855531002.dkr.ecr.us-east-1.amazonaws.com/eks_cobol/cobol_0"
    tag: "2"
    pullPolicy: Always

  nodeSelector:
    gpu: 'false'

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

  schedule: "0 * * * *"

  storage:
    size: 5Gi
    accessModes:
      - ReadWriteMany
    reclaimPolicy: Retain
    storageClassName: efs-sc
    volumeHandle: fs-033cec616c35aff95:/

  environment:
    INPUT_FILE: /mnt/efs/input/orders.csv
    OUTPUT_FILE: /mnt/efs/output/transformed_orders.txt

cobolml:
  name: cobol-ml

  storage:
    size: 5Gi
    accessModes:
      - ReadWriteMany
    reclaimPolicy: Retain
    storageClassName: efs-sc
    volumeHandle: fs-0b11c021faf9e5922:/


deepseek:
  name: deepseek

  replicaCount: 1
  image:
    repository: "704855531002.dkr.ecr.us-east-1.amazonaws.com/eks_cobol/deepseek"
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 11434

  nodeSelector:
    gpu: 'true'

  resources:
    limits:
      gpu: 1
    requests:
      cpu: "1"
      memory: "2Gi"
      gpu: 1

llm:
  name: llm

  image:
    repository: "704855531002.dkr.ecr.us-east-1.amazonaws.com/eks_cobol/llm"
    tag: "1"
    pullPolicy: Always

  nodeSelector:
    gpu: "false"

  schedule: "0 * * * *"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

  storage:
    size: 5Gi
    accessModes:
      - ReadWriteMany
    reclaimPolicy: Retain
    storageClassName: efs-sc
    volumeHandle: fs-033cec616c35aff95:/

  environment:
    TRANSFORMED_FILE: "/mnt/efs/output/transformed_orders.txt"
    LLM_TRANSFORMED_FILE: "/mnt/efs/output/llm_transformed_orders.txt"
